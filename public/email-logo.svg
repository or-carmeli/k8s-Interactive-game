<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 480 100">
  <defs>
    <radialGradient id="lbg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020817"/>
    </radialGradient>
    <linearGradient id="lgr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="40%" stop-color="#A855F7"/>
      <stop offset="80%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#00D4FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="100" fill="#020817"/>

  <!-- Logo wheel (exact match: viewBox 0 0 100 100, drawn at center 135,50, scale ~0.5) -->
  <g transform="translate(135,50) scale(0.5)">
    <circle cx="0" cy="0" r="50" fill="url(#lbg)"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="url(#lgr)" stroke-width="4" opacity="0.9"/>
    <!-- 7 spokes -->
    <g stroke="url(#lgr)" stroke-width="2.8" stroke-linecap="round">
      <line x1="0" y1="-18" x2="0" y2="-34"/>
      <line x1="0" y1="-18" x2="0" y2="-34" transform="rotate(51.4)"/>
      <line x1="0" y1="-18" x2="0" y2="-34" transform="rotate(102.8)"/>
      <line x1="0" y1="-18" x2="0" y2="-34" transform="rotate(154.2)"/>
      <line x1="0" y1="-18" x2="0" y2="-34" transform="rotate(205.7)"/>
      <line x1="0" y1="-18" x2="0" y2="-34" transform="rotate(257.1)"/>
      <line x1="0" y1="-18" x2="0" y2="-34" transform="rotate(308.5)"/>
    </g>
    <!-- Inner hub -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="url(#lgr)" stroke-width="3"/>
    <circle cx="0" cy="0" r="5" fill="#00D4FF"/>
    <!-- 7 outer dots (exact app colors) -->
    <circle cx="0" cy="-34" r="3.5" fill="#00D4FF"/>
    <circle cx="0" cy="-34" r="3.5" fill="#7B9FF7" transform="rotate(51.4)"/>
    <circle cx="0" cy="-34" r="3.5" fill="#A855F7" transform="rotate(102.8)"/>
    <circle cx="0" cy="-34" r="3.5" fill="#CC60CC" transform="rotate(154.2)"/>
    <circle cx="0" cy="-34" r="3.5" fill="#FF6B35" transform="rotate(205.7)"/>
    <circle cx="0" cy="-34" r="3.5" fill="#FF8C35" transform="rotate(257.1)"/>
    <circle cx="0" cy="-34" r="3.5" fill="#44AAEE" transform="rotate(308.5)"/>
  </g>

  <!-- KubeQuest text (gradient, bold, exact match) -->
  <text x="310" y="44" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="30" font-weight="900" letter-spacing="-0.5" fill="url(#textGrad)">KubeQuest</text>

  <!-- Subtitle -->
  <text x="310" y="64" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="11" letter-spacing="0.4" fill="#64748b">Train Your Kubernetes Skills</text>
</svg>
