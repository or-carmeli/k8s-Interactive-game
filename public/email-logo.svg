<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <radialGradient id="logobg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#020817"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="120" rx="0" fill="#020817"/>

  <!-- Logo icon centered at (60, 60) -->
  <g transform="translate(100,60)">
    <!-- Background circle -->
    <circle cx="0" cy="0" r="38" fill="url(#logobg)"/>

    <!-- Outer ring -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="url(#accent)" stroke-width="2.8" opacity="0.85" filter="url(#glow)"/>

    <!-- 7 spokes -->
    <g filter="url(#glow)">
      <line x1="0" y1="-13" x2="0" y2="-26" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="0" y1="-13" x2="0" y2="-26" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" transform="rotate(51.4)"/>
      <line x1="0" y1="-13" x2="0" y2="-26" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" transform="rotate(102.8)"/>
      <line x1="0" y1="-13" x2="0" y2="-26" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" transform="rotate(154.2)"/>
      <line x1="0" y1="-13" x2="0" y2="-26" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" transform="rotate(205.7)"/>
      <line x1="0" y1="-13" x2="0" y2="-26" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" transform="rotate(257.1)"/>
      <line x1="0" y1="-13" x2="0" y2="-26" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" transform="rotate(308.5)"/>
    </g>

    <!-- Inner hub -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="url(#accent)" stroke-width="2" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="4" fill="#00D4FF" filter="url(#glow)"/>

    <!-- Outer dots -->
    <circle cx="0" cy="-26" r="3" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="0" cy="-26" r="3" fill="#5BC8FF" filter="url(#glow)" transform="rotate(51.4)"/>
    <circle cx="0" cy="-26" r="3" fill="#A855F7" filter="url(#glow)" transform="rotate(102.8)"/>
    <circle cx="0" cy="-26" r="3" fill="#C060E0" filter="url(#glow)" transform="rotate(154.2)"/>
    <circle cx="0" cy="-26" r="3" fill="#FF6B35" filter="url(#glow)" transform="rotate(205.7)"/>
    <circle cx="0" cy="-26" r="3" fill="#FF9055" filter="url(#glow)" transform="rotate(257.1)"/>
    <circle cx="0" cy="-26" r="3" fill="#33BBFF" filter="url(#glow)" transform="rotate(308.5)"/>
  </g>

  <!-- KubeQuest text -->
  <text x="290" y="52" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="34" font-weight="800" fill="url(#textGrad)">KubeQuest</text>

  <!-- Subtitle -->
  <text x="290" y="78" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="13" fill="#64748b">Train Your Kubernetes Skills</text>
</svg>
