<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020817"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <radialGradient id="logobg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="100%" stop-color="#020817"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- Big glow behind logo -->
  <circle cx="600" cy="215" r="90" fill="#00D4FF" opacity="0.06" filter="url(#bigGlow)"/>

  <!-- === Actual App Logo (scaled from favicon.svg, centered at 600,215) === -->
  <g transform="translate(600,215)">
    <!-- Background circle -->
    <circle cx="0" cy="0" r="64" fill="url(#logobg)"/>

    <!-- Outer glow ring -->
    <circle cx="0" cy="0" r="58" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.85" filter="url(#glow)"/>

    <!-- 7 spokes -->
    <g filter="url(#glow)">
      <line x1="0" y1="-22" x2="0" y2="-44" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>
      <line x1="0" y1="-22" x2="0" y2="-44" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" transform="rotate(51.4)"/>
      <line x1="0" y1="-22" x2="0" y2="-44" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" transform="rotate(102.8)"/>
      <line x1="0" y1="-22" x2="0" y2="-44" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" transform="rotate(154.2)"/>
      <line x1="0" y1="-22" x2="0" y2="-44" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" transform="rotate(205.7)"/>
      <line x1="0" y1="-22" x2="0" y2="-44" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" transform="rotate(257.1)"/>
      <line x1="0" y1="-22" x2="0" y2="-44" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round" transform="rotate(308.5)"/>
    </g>

    <!-- Inner hub ring -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#accent)" stroke-width="3.5" filter="url(#glow)"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="7" fill="#00D4FF" filter="url(#glow)"/>

    <!-- 7 outer dots at spoke tips -->
    <circle cx="0" cy="-44" r="5" fill="#00D4FF" filter="url(#glow)"/>
    <circle cx="0" cy="-44" r="5" fill="#5BC8FF" filter="url(#glow)" transform="rotate(51.4)"/>
    <circle cx="0" cy="-44" r="5" fill="#A855F7" filter="url(#glow)" transform="rotate(102.8)"/>
    <circle cx="0" cy="-44" r="5" fill="#C060E0" filter="url(#glow)" transform="rotate(154.2)"/>
    <circle cx="0" cy="-44" r="5" fill="#FF6B35" filter="url(#glow)" transform="rotate(205.7)"/>
    <circle cx="0" cy="-44" r="5" fill="#FF9055" filter="url(#glow)" transform="rotate(257.1)"/>
    <circle cx="0" cy="-44" r="5" fill="#33BBFF" filter="url(#glow)" transform="rotate(308.5)"/>
  </g>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="58" font-weight="800" fill="#e2e8f0">KubeQuest Status</text>

  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-family="Segoe UI, system-ui, sans-serif" font-size="24" fill="#64748b">Real-time platform and service health</text>

  <!-- Status badge -->
  <rect x="410" y="420" width="380" height="56" rx="28" fill="#10B98112" stroke="#10B98133" stroke-width="1.5"/>
  <circle cx="455" cy="448" r="10" fill="#10B981"/>
  <text x="478" y="456" font-family="Segoe UI, system-ui, sans-serif" font-size="24" font-weight="700" fill="#10B981">All Systems Operational</text>

  <!-- URL -->
  <text x="600" y="545" text-anchor="middle" font-family="'SF Mono', 'Fira Code', monospace" font-size="18" fill="#475569">status.kubequest.online</text>
</svg>
