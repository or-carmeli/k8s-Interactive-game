<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no" />

    <!-- Canonical -->
    <link rel="canonical" href="https://kubequest.online/" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020817" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KubeQuest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- SEO -->
    <title>KubeQuest – Kubernetes Practice Game</title>
    <meta name="description" content="Practice Kubernetes through real DevOps troubleshooting scenarios. Designed for engineers preparing for Kubernetes interviews and CKA." />

    <!-- Open Graph (WhatsApp, LinkedIn, Facebook, Slack) -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="KubeQuest" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kubequest.online" />
    <meta property="og:title" content="KubeQuest – Kubernetes Practice Game" />
    <meta property="og:description" content="Practice Kubernetes through real DevOps troubleshooting scenarios. Designed for engineers preparing for Kubernetes interviews and CKA." />
    <meta property="og:image" content="https://kubequest.online/share-preview.png" />
    <meta property="og:image:secure_url" content="https://kubequest.online/share-preview.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="KubeQuest – Kubernetes Practice Game" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@KubeQuest" />
    <meta name="twitter:title" content="KubeQuest – Kubernetes Practice Game" />
    <meta name="twitter:description" content="Practice Kubernetes through real DevOps troubleshooting scenarios. Designed for engineers preparing for Kubernetes interviews and CKA." />
    <meta name="twitter:image" content="https://kubequest.online/share-preview.png" />
    <meta name="twitter:image:alt" content="KubeQuest – Kubernetes Practice Game" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      button, a, [role="button"] { touch-action: manipulation; }
      html { overflow-x: hidden; max-width: 100%; }
      body {
        background: var(--bg-body, #020817);
        overflow-x: hidden;
        max-width: 100vw;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
    </style>
    <script>
      // Apply saved theme before React loads to prevent flash
      try { var t = localStorage.getItem("kq_theme"); if (t) document.documentElement.setAttribute("data-theme", t); } catch(e) {}
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Blank-screen safety net: if React never renders, show recovery UI -->
    <script>
      setTimeout(function() {
        var root = document.getElementById("root");
        if (root && root.children.length === 0) {
          console.error("[KubeQuest:boot] React did not render within 8 s — showing fallback");
          root.innerHTML = '<div style="min-height:100vh;background:#020817;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;padding:24px">' +
            '<div style="max-width:420px;text-align:center;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:16px;padding:40px 32px">' +
            '<div style="font-size:48px;margin-bottom:16px">&#9888;&#65039;</div>' +
            '<h1 style="color:#e2e8f0;font-size:20px;font-weight:700;margin:0 0 8px">Loading timed out</h1>' +
            '<p style="color:#94a3b8;font-size:14px;margin:0 0 20px;line-height:1.5">The app did not start. This is usually caused by a stale cache.</p>' +
            '<div style="display:flex;gap:12px;justify-content:center">' +
            '<button onclick="location.reload()" style="padding:10px 22px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:10px;color:#94a3b8;font-size:14px;font-weight:600;cursor:pointer">Reload</button>' +
            '<button onclick="localStorage.clear();sessionStorage.clear();if(navigator.serviceWorker)navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(s){s.unregister()})});setTimeout(function(){location.reload()},500)" style="padding:10px 22px;background:linear-gradient(135deg,rgba(0,212,255,0.18),rgba(168,85,247,0.18));border:1px solid rgba(0,212,255,0.45);border-radius:10px;color:#00D4FF;font-size:14px;font-weight:700;cursor:pointer">Clear Cache &amp; Reload</button>' +
            '</div></div></div>';
        }
      }, 8000);
    </script>

    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js", { updateViaCache: "none" })
            .then(reg => {
              console.log("SW registered:", reg.scope);
              // Check for updates periodically
              setInterval(() => reg.update(), 60000);
              reg.addEventListener("updatefound", () => {
                var newSW = reg.installing;
                if (!newSW) return;
                newSW.addEventListener("statechange", () => {
                  if (newSW.state === "activated" && navigator.serviceWorker.controller) {
                    // Don't interrupt an active quiz or incident — defer reload
                    if (window.__KQ_QUIZ_ACTIVE__) {
                      console.log("[KubeQuest] New SW activated; deferring reload (quiz active)");
                      window.__KQ_PENDING_RELOAD__ = true;
                      return;
                    }
                    console.log("[KubeQuest] New SW activated, reloading for fresh assets");
                    window.location.reload();
                  }
                });
              });
            })
            .catch(e => console.log("SW error:", e));
        });
      }
    </script>
  </body>
</html>
