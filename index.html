<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no,date=no,address=no,email=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020817" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KubeQuest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- SEO -->
    <title>KubeQuest</title>
    <meta name="description" content="Learn Kubernetes in a fun and interactive way." />

    <!-- Open Graph (LinkedIn / WhatsApp / social sharing) -->
    <meta property="og:title" content="KubeQuest – Learn Kubernetes with an Interactive Game" />
    <meta property="og:site_name" content="KubeQuest" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kubequest.online" />
    <meta property="og:description" content="Practice Kubernetes scenarios and test your DevOps skills." />
    <meta property="og:image" content="https://kube-quest.vercel.app/og-image-v3.png" />
    <meta property="og:image:secure_url" content="https://kube-quest.vercel.app/og-image-v3.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Optional: helps some platforms -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KubeQuest – Learn Kubernetes with an Interactive Game" />
    <meta name="twitter:description" content="Practice Kubernetes scenarios and test your DevOps skills." />
    <meta name="twitter:image" content="https://kube-quest.vercel.app/og-image-v3.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #020817;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('SW registered:', r.scope))
            .catch(e => console.log('SW error:', e));
        });
      }
    </script>
  </body>
</html>
