apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kubequest
  namespace: kubequest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kubequest
  minReplicas: 2     # Always keep at least 2 pods for high availability
  maxReplicas: 10    # Scale up to 10 pods under heavy load
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up when average CPU exceeds 70%
